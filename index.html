<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาตัวตนที่แท้จริง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Kanit', sans-serif;
  min-height: 100vh;
  background: #07070d;
  color: #e0d0ff;
  overflow-x: hidden;
  cursor: default;
}

canvas#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.12;
}
.glow-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: #7c3aed; animation: floatGlow 30s ease-in-out infinite alternate; }
.glow-2 { width: 500px; height: 500px; bottom: -150px; left: -150px; background: #2563eb; animation: floatGlow 25s ease-in-out infinite alternate-reverse; }
.glow-3 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #db2777; animation: floatGlow 20s ease-in-out infinite alternate; }
@keyframes floatGlow {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(60px,-40px) scale(1.15); }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 30px 16px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.glass {
  width: 100%;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 28px;
  padding: 44px 36px;
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
}
.glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(124,58,237,0.05), transparent 50%);
  pointer-events: none;
}

.hidden { display: none !important; }

/* === START === */
.start-screen { text-align: center; }
.start-icon {
  font-size: 5rem;
  display: block;
  margin-bottom: 8px;
  animation: levitate 4s ease-in-out infinite;
}
@keyframes levitate {
  0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 20px rgba(124,58,237,0.3)); }
  50% { transform: translateY(-14px) scale(1.02); filter: drop-shadow(0 0 40px rgba(124,58,237,0.6)); }
}
.start-screen h1 {
  font-size: 2.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, #c084fc, #60a5fa, #f472b6, #c084fc);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 8px;
  animation: shimmer 6s ease-in-out infinite;
}
@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.start-screen .tagline {
  color: #8a7ca0;
  font-size: 1rem;
  margin-bottom: 28px;
  line-height: 1.7;
}
.name-input-wrap {
  margin-bottom: 20px;
}
.name-input-wrap input {
  font-family: 'Kanit', sans-serif;
  width: 100%;
  max-width: 320px;
  padding: 14px 20px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #f0e8ff;
  font-size: 1rem;
  text-align: center;
  outline: none;
  transition: all 0.3s;
}
.name-input-wrap input:focus {
  border-color: #7c3aed;
  box-shadow: 0 0 30px rgba(124,58,237,0.15);
}
.name-input-wrap input::placeholder { color: #6a5c80; }

.btn {
  font-family: 'Kanit', sans-serif;
  padding: 15px 44px;
  border: none;
  border-radius: 50px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}
.btn-primary {
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  color: #fff;
  box-shadow: 0 4px 30px rgba(124,58,237,0.25);
}
.btn-primary:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 12px 45px rgba(124,58,237,0.4);
}
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50px;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: 0.6s;
}
.btn-primary:hover::after { transform: translateX(100%); }

/* === QUIZ === */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.q-num {
  color: #7c3aed;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 1px;
}
.q-counter {
  color: #6a5c80;
  font-size: 0.8rem;
}
.progress-track {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #60a5fa, #c084fc);
  background-size: 200% 100%;
  border-radius: 4px;
  transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  animation: progressGlow 3s ease-in-out infinite;
}
@keyframes progressGlow {
  0%, 100% { background-position: 0% 0%; }
  50% { background-position: 100% 0%; }
}
.q-text {
  font-size: 1.35rem;
  font-weight: 500;
  color: #f0e8ff;
  margin-bottom: 28px;
  line-height: 1.6;
  min-height: 80px;
}

.options-grid { display: flex; flex-direction: column; gap: 10px; }

.opt-btn {
  width: 100%;
  padding: 16px 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  color: #d0c0e8;
  font-size: 1rem;
  text-align: left;
  font-family: 'Kanit', sans-serif;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  line-height: 1.5;
  position: relative;
  overflow: hidden;
}
.opt-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: linear-gradient(135deg, #7c3aed20, transparent);
  opacity: 0;
  transition: opacity 0.35s;
}
.opt-btn:hover:not(.selected) {
  background: rgba(255,255,255,0.07);
  border-color: rgba(124,58,237,0.3);
  transform: translateX(6px);
}
.opt-btn:hover::before { opacity: 1; }
.opt-btn.selected {
  background: rgba(124,58,237,0.15);
  border-color: #7c3aed;
  box-shadow: 0 0 30px rgba(124,58,237,0.12), inset 0 0 20px rgba(124,58,237,0.05);
  transform: translateX(8px);
}
.opt-btn .opt-letter {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  border-radius: 8px;
  background: rgba(124,58,237,0.12);
  color: #a78bfa;
  font-weight: 600;
  font-size: 0.8rem;
  margin-right: 12px;
  transition: all 0.35s;
}
.opt-btn.selected .opt-letter {
  background: #7c3aed;
  color: #fff;
}
.btn-next-wrap { margin-top: 16px; }
.btn-next {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 1.05rem;
  font-weight: 600;
  font-family: 'Kanit', sans-serif;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  opacity: 0.3;
  pointer-events: none;
  position: relative;
  overflow: hidden;
}
.btn-next.active { opacity: 1; pointer-events: auto; }
.btn-next.active:hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(124,58,237,0.3); }
.btn-next.active:active { transform: translateY(0) scale(0.99); }

/* === RESULT === */
.result-screen { text-align: center; }
.result-icon-big {
  font-size: 6rem;
  display: block;
  margin-bottom: 4px;
  animation: resultFloat 4s ease-in-out infinite;
}
@keyframes resultFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-8px) rotate(-3deg); }
  75% { transform: translateY(-4px) rotate(3deg); }
}
.result-badge {
  display: inline-block;
  padding: 4px 20px;
  border-radius: 50px;
  background: rgba(124,58,237,0.12);
  border: 1px solid rgba(124,58,237,0.2);
  color: #a78bfa;
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.result-screen h2 {
  font-size: 2.2rem;
  font-weight: 800;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #c084fc, #60a5fa, #f472b6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.result-sub {
  color: #8a7ca0;
  font-size: 1rem;
  margin-bottom: 20px;
}
.traits-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
}
.trait {
  padding: 5px 14px;
  background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.15);
  border-radius: 50px;
  font-size: 0.8rem;
  color: #c084fc;
  animation: fadeUp 0.5s ease forwards;
  opacity: 0;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-desc {
  color: #d0c0e8;
  font-size: 0.95rem;
  line-height: 1.9;
  margin-bottom: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
  text-align: left;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.detail-card {
  padding: 14px;
  background: rgba(255,255,255,0.03);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.05);
  text-align: left;
}
.detail-card .label {
  font-size: 0.7rem;
  color: #6a5c80;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.detail-card .value {
  font-size: 0.9rem;
  color: #d0c0e8;
}
.bar-section {
  margin: 16px 0;
  padding: 16px 20px;
  background: rgba(255,255,255,0.02);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.04);
}
.bar-section .bar-title {
  color: #8a7ca0;
  font-size: 0.8rem;
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.bar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.bar-label {
  width: 70px;
  font-size: 0.85rem;
  color: #8a7ca0;
  text-align: right;
  flex-shrink: 0;
}
.bar-bg {
  flex: 1;
  height: 7px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  width: 0;
  transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.bar-pct {
  width: 38px;
  font-size: 0.8rem;
  color: #a78bfa;
  font-weight: 600;
  flex-shrink: 0;
}
.result-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 8px;
}
.btn-secondary {
  font-family: 'Kanit', sans-serif;
  padding: 12px 28px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  color: #d0c0e8;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(124,58,237,0.3);
  transform: translateY(-2px);
}

footer {
  margin-top: 20px;
  color: #4a3c60;
  font-size: 0.8rem;
  text-align: center;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(124,58,237,0.9);
  backdrop-filter: blur(12px);
  padding: 12px 28px;
  border-radius: 50px;
  color: #fff;
  font-size: 0.9rem;
  z-index: 100;
  opacity: 0;
  transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .glass { padding: 28px 18px; border-radius: 20px; }
  .start-screen h1 { font-size: 1.8rem; }
  .q-text { font-size: 1.1rem; min-height: 60px; }
  .result-screen h2 { font-size: 1.6rem; }
  .result-icon-big { font-size: 4.5rem; }
  .detail-grid { grid-template-columns: 1fr; }
  .opt-btn { padding: 14px 16px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>
<div class="toast" id="toast"></div>

<div class="container">
  <div class="glass">

    <div id="startScreen" class="start-screen">
      <span class="start-icon">🔮</span>
      <h1>ค้นหาตัวตนที่แท้จริง</h1>
      <p class="tagline">ปลดล็อกพลังภายในตัวคุณ<br>ตอบคำถาม 15 ข้อ เพื่อค้นพบว่าคุณคือใคร</p>
      <div class="name-input-wrap">
        <input type="text" id="nameInput" placeholder="กรอกชื่อของคุณ..." maxlength="30" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">
        ✦ เริ่มสำรวจ
      </button>
    </div>

    <div id="quizScreen" class="hidden">
      <div class="quiz-header">
        <span class="q-num" id="questionLabel">✦ ข้อที่ 1</span>
        <span class="q-counter" id="questionCounter">1 / 15</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="q-text" id="questionText"></div>
      <div class="options-grid" id="optionsContainer"></div>
      <div class="btn-next-wrap">
        <button class="btn-next" id="btnNext" onclick="nextQuestion()">✦ ถัดไป</button>
      </div>
    </div>

    <div id="resultScreen" class="hidden result-screen">
      <span class="result-icon-big" id="resultIcon">🌟</span>
      <div class="result-badge" id="resultBadge">บุคลิกภาพ</div>
      <h2 id="resultTitle">คุณคือ...</h2>
      <p class="result-sub" id="resultSubtitle"></p>
      <div class="traits-wrap" id="resultTraits"></div>
      <div class="result-desc" id="resultDescription"></div>
      <div class="detail-grid">
        <div class="detail-card">
          <div class="label">จุดแข็ง</div>
          <div class="value" id="detailStrength"></div>
        </div>
        <div class="detail-card">
          <div class="label">คำแนะนำ</div>
          <div class="value" id="detailAdvice"></div>
        </div>
      </div>
      <div class="bar-section">
        <div class="bar-title">สัดส่วนบุคลิกภาพ</div>
        <div id="barContainer"></div>
      </div>
      <div class="result-actions">
        <button class="btn-secondary" onclick="shareResult()">📤 แชร์ผลลัพท์</button>
        <button class="btn-primary" onclick="restartQuiz()">✦ ทำใหม่</button>
      </div>
    </div>

  </div>
  <footer>✨ รู้จักตัวเองมากขึ้น — ทุกคนมีเอกลักษณ์ในแบบของตัวเอง</footer>
</div>

<script>
// === Particle canvas ===
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let pW, pH, particles = [], mouse = { x: -9999, y: -9999 };

function resizeParticles() {
  pW = canvas.width = window.innerWidth;
  pH = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeParticles);
resizeParticles();

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * pW;
    this.y = Math.random() * pH;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.hue = Math.random() * 60 + 260;
  }
  update() {
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200) {
      const force = (200 - dist) / 200 * 0.3;
      this.x -= dx / dist * force;
      this.y -= dy / dist * force;
    }
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > pW || this.y < 0 || this.y > pH) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
document.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

let animId;
function animateParticles() {
  ctx.clearRect(0, 0, pW, pH);
  particles.forEach(p => { p.update(); p.draw(); });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `hsla(270, 60%, 60%, ${(1 - d / 120) * 0.12})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  animId = requestAnimationFrame(animateParticles);
}
animateParticles();

// === Quiz data ===
const types = [
  { id: 'warrior', name: 'นักรบ', icon: '⚔️', traits: ['กล้าหาญ','มุ่งมั่น','ตรงไปตรงมา','มีความเป็นผู้นำ','กล้าตัดสินใจ'],
    strength: 'กล้าหาญ ตัดสินใจเร็ว ไม่ยอมแพ้ต่ออุปสรรค',
    advice: 'ฝึกฟังความคิดเห็นผู้อื่นบ้าง บางครั้งใช้อารมณ์มากไป',
    desc: 'คุณคือคนที่มีจิตใจเข้มแข็ง ไม่กลัวอุปสรรค เมื่อมีเป้าหมายคุณจะเดินไปข้างหน้าอย่างไม่ย่อท้อ คุณเป็นผู้นำโดยธรรมชาติ คนรอบข้างมองหาคุณเมื่อถึงเวลาต้องตัดสินใจ คุณเชื่อว่า "ทุกอุปสรรคมีทางผ่าน" และพร้อมจะสู้เพื่อสิ่งที่ถูกต้อง' },
  { id: 'sage', name: 'นักปราชญ์', icon: '📜', traits: ['ฉลาด','รอบคอบ','ช่างคิด','มีเหตุผล','ชอบเรียนรู้'],

// === Quiz logic ===
let current = 0, scores = {}, answers = [], userName = '';

function startQuiz() {
  userName = document.getElementById('nameInput').value.trim() || 'คุณ';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  current = 0;
  scores = { warrior: 0, sage: 0, dreamer: 0, diplomat: 0 };
  answers = [];
  renderQ();
}

function renderQ() {
  const q = questions[current];
  document.getElementById('questionLabel').textContent = `✦ ข้อที่ ${current + 1}`;
  document.getElementById('questionCounter').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = (current / questions.length * 100) + '%';
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionText').style.opacity = '0';
  setTimeout(() => { document.getElementById('questionText').style.opacity = '1'; document.getElementById('questionText').style.transition = 'opacity 0.4s'; }, 50);

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = 'กขคง';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt.t}`;
    btn.dataset.type = opt.type;
    btn.dataset.idx = i;
    btn.onclick = () => selectOpt(i);
    btn.style.animationDelay = (i * 0.07) + 's';
    container.appendChild(btn);
  });
  document.getElementById('btnNext').classList.remove('active');
}

function selectOpt(idx) {
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b, i) => b.classList.toggle('selected', i === idx));
  document.getElementById('btnNext').classList.add('active');
  answers[current] = idx;
}

function nextQuestion() {
  if (answers[current] === undefined) return;
  const q = questions[current];
  scores[q.opts[answers[current]].type]++;
  current++;
  if (current < questions.length) renderQ();
  else showResult();
}

function showResult() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '100%';

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top = types.find(t => t.id === sorted[0][0]);
  const second = types.find(t => t.id === sorted[1][0]);

  document.getElementById('resultIcon').textContent = top.icon;
  document.getElementById('resultBadge').textContent = `✦ ${top.name}`;
  document.getElementById('resultTitle').textContent = `${userName} คือ "${top.name}"`;
  document.getElementById('resultSubtitle').textContent = `บุคลิกภาพที่ ${top.traits[0]} และ${top.traits[1]}`;

  const traitsEl = document.getElementById('resultTraits');
  traitsEl.innerHTML = '';
  top.traits.forEach((t, i) => {
    const span = document.createElement('span');
    span.className = 'trait';
    span.textContent = t;
    span.style.animationDelay = (i * 0.08) + 's';
    traitsEl.appendChild(span);
  });

  document.getElementById('resultDescription').textContent = top.desc;
  document.getElementById('detailStrength').textContent = top.strength;
  document.getElementById('detailAdvice').textContent = top.advice;

  const bars = document.getElementById('barContainer');
  bars.innerHTML = '';
  const colors = { warrior: '#ef4444', sage: '#3b82f6', dreamer: '#a855f7', diplomat: '#10b981' };
  sorted.forEach(([id, score], i) => {
    const pct = Math.round(score / questions.length * 100);
    const info = types.find(t => t.id === id);
    const div = document.createElement('div');
    div.className = 'bar-item';
    div.style.animationDelay = (i * 0.1) + 's';
    div.innerHTML = `
      <span class="bar-label">${info.icon} ${info.name}</span>
      <div class="bar-bg"><div class="bar-fill" data-pct="${pct}" style="background:${colors[id]}"></div></div>
      <span class="bar-pct">0%</span>
    `;
    bars.appendChild(div);
  });

  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      const pct = parseInt(el.dataset.pct);
      el.style.width = pct + '%';
    });
    setTimeout(() => {
      document.querySelectorAll('.bar-item').forEach((item, i) => {
        const pct = parseInt(item.querySelector('.bar-fill').dataset.pct);
        item.querySelector('.bar-pct').textContent = pct + '%';
      });
    }, 1800);
  }, 300);
}

function shareResult() {
  const topId = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const top = types.find(t => t.id === topId);
  const text = `🔮 ${userName} ได้ "${top.name}" ${top.icon} จากแบบทดสอบบุคลิกภาพ!\n\n✨ ลองทำดู: https://nozor1x-gif.github.io/personality-quiz/`;
  if (navigator.share) {
    navigator.share({ title: 'ค้นหาตัวตนที่แท้จริง', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('📋 คัดลอกลิงก์แชร์แล้ว!')).catch(() => {});
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function restartQuiz() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('nameInput').focus();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('startScreen').classList.contains('hidden')) startQuiz();
    else if (document.getElementById('btnNext').classList.contains('active')) nextQuestion();
  }
});
