<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รู้จักตัวตนของคุณ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Kanit', sans-serif;
  min-height: 100vh;
  background: #0a0a0f;
  color: #e0d0ff;
  overflow-x: hidden;
}
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.2); }
}
.glow-circle {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.gc1 { top: -100px; right: -100px; background: #7c3aed; animation: drift 20s ease-in-out infinite alternate; }
.gc2 { bottom: -100px; left: -100px; background: #2563eb; animation: drift 25s ease-in-out infinite alternate-reverse; }
.gc3 { top: 50%; left: 50%; transform: translate(-50%,-50%); background: #db2777; animation: drift 15s ease-in-out infinite alternate; }
@keyframes drift {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(30px,-30px) scale(1.1); }
}
.container {
  position: relative;
  z-index: 1;
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.card {
  width: 100%;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 40px 32px;
  transition: all 0.5s ease;
}
.hidden { display: none !important; }
.start-screen { text-align: center; }
.start-screen h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #c084fc, #60a5fa, #f472b6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 12px;
}
.start-screen .subtitle {
  color: #a89bc0;
  font-size: 1.1rem;
  margin-bottom: 32px;
  line-height: 1.7;
}
.start-screen .mystic-icon {
  font-size: 4rem;
  margin-bottom: 20px;
  display: block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.btn {
  font-family: 'Kanit', sans-serif;
  padding: 14px 40px;
  border: none;
  border-radius: 50px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  color: #fff;
  box-shadow: 0 4px 25px rgba(124,58,237,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 35px rgba(124,58,237,0.4);
}
.btn-option {
  width: 100%;
  padding: 16px 20px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: #d0c0e8;
  font-size: 1rem;
  text-align: left;
  transition: all 0.3s ease;
  font-family: 'Kanit', sans-serif;
  cursor: pointer;
  line-height: 1.5;
}
.btn-option:hover {
  background: rgba(124,58,237,0.15);
  border-color: #7c3aed;
  transform: translateX(4px);
}
.btn-option.selected {
  background: rgba(124,58,237,0.2);
  border-color: #7c3aed;
  box-shadow: 0 0 20px rgba(124,58,237,0.15);
}
.question-header {
  margin-bottom: 24px;
}
.question-number {
  color: #7c3aed;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-bottom: 24px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #60a5fa);
  border-radius: 2px;
  transition: width 0.5s ease;
}
.question-text {
  font-size: 1.35rem;
  font-weight: 500;
  color: #f0e8ff;
  margin-bottom: 24px;
  line-height: 1.6;
}
.btn-next {
  width: 100%;
  margin-top: 8px;
  padding: 14px;
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 1.05rem;
  font-weight: 600;
  font-family: 'Kanit', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  opacity: 0.5;
  pointer-events: none;
}
.btn-next.active {
  opacity: 1;
  pointer-events: auto;
}
.btn-next.active:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,58,237,0.3);
}
.result-screen {
  text-align: center;
}
.result-icon {
  font-size: 5rem;
  margin-bottom: 16px;
  display: block;
  animation: float 3s ease-in-out infinite;
}
.result-screen h2 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #c084fc, #60a5fa, #f472b6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.result-subtitle {
  color: #a89bc0;
  font-size: 1.1rem;
  margin-bottom: 20px;
}
.result-description {
  color: #d0c0e8;
  font-size: 1rem;
  line-height: 1.8;
  margin-bottom: 24px;
  padding: 20px;
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  text-align: left;
}
.result-traits {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}
.trait-tag {
  padding: 6px 16px;
  background: rgba(124,58,237,0.15);
  border: 1px solid rgba(124,58,237,0.25);
  border-radius: 20px;
  font-size: 0.85rem;
  color: #c084fc;
}
.scores-section {
  margin: 20px 0;
  padding: 20px;
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.score-item {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.score-label {
  width: 80px;
  font-size: 0.9rem;
  color: #a89bc0;
  text-align: right;
}
.score-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1.5s ease;
}
.score-val {
  width: 40px;
  font-size: 0.85rem;
  color: #c084fc;
  font-weight: 600;
}
footer {
  margin-top: 24px;
  color: #6a5c80;
  font-size: 0.85rem;
  text-align: center;
}
@media (max-width: 600px) {
  .card { padding: 28px 18px; }
  .start-screen h1 { font-size: 1.8rem; }
  .question-text { font-size: 1.1rem; }
  .result-screen h2 { font-size: 1.5rem; }
  .btn-option { padding: 14px 16px; font-size: 0.95rem; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow-circle gc1"></div>
<div class="glow-circle gc2"></div>
<div class="glow-circle gc3"></div>

<div class="container">
  <div class="card">

    <div id="startScreen" class="start-screen">
      <span class="mystic-icon">🔮</span>
      <h1>ค้นหาตัวตนที่แท้จริง</h1>
      <p class="subtitle">ตอบคำถาม 15 ข้อ เพื่อค้นพบว่าคุณเป็นคนแบบไหน<br>ปลดล็อกพลังภายในตัวคุณ</p>
      <button class="btn btn-primary" onclick="startQuiz()">
        ✦ เริ่มสำรวจตัวตน
      </button>
    </div>

    <div id="quizScreen" class="hidden">
      <div class="question-header">
        <div class="question-number" id="questionNumber">ข้อที่ 1 / 15</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div id="optionsContainer"></div>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">✦ ถัดไป</button>
    </div>

    <div id="resultScreen" class="hidden result-screen">
      <span class="result-icon" id="resultIcon">🌟</span>
      <h2 id="resultTitle">คุณคือ...</h2>
      <p class="result-subtitle" id="resultSubtitle">บุคลิกภาพที่หายาก</p>
      <div class="result-traits" id="resultTraits"></div>
      <div class="result-description" id="resultDescription"></div>
      <div class="scores-section" id="scoresSection"></div>
      <button class="btn btn-primary" onclick="restartQuiz()">✦ ทำแบบทดสอบอีกครั้ง</button>
    </div>

  </div>
  <footer>✨ รู้จักตัวเองมากขึ้น — ทุกคนมีเอกลักษณ์ในแบบของตัวเอง</footer>
</div>

<script>
const types = [
  {
    id: 'warrior',
    name: 'นักรบ',
    icon: '⚔️',
    traits: ['กล้าหาญ', 'มุ่งมั่น', 'ตรงไปตรงมา', 'มีความเป็นผู้นำ', 'กล้าตัดสินใจ'],
    desc: 'คุณคือคนที่มีจิตใจเข้มแข็ง ไม่กลัวอุปสรรค เมื่อมีเป้าหมายคุณจะเดินไปข้างหน้าอย่างไม่ย่อท้อ คุณเป็นผู้นำโดยธรรมชาติ คนรอบข้างมองหาคุณเมื่อถึงเวลาต้องตัดสินใจ คุณเชื่อว่า "ทุกอุปสรรคมีทางผ่าน" และพร้อมจะสู้เพื่อสิ่งที่ถูกต้อง จุดแข็งของคุณคือความกล้าหาญและความมุ่งมั่น แต่อย่าลืมฟังคนรอบข้างบ้างนะ'
  },
  {
    id: 'sage',
    name: 'นักปราชญ์',
    icon: '📜',
    traits: ['ฉลาด', 'รอบคอบ', 'ช่างคิด', 'มีเหตุผล', 'ชอบเรียนรู้'],
    desc: 'คุณเป็นคนที่รักการเรียนรู้และแสวงหาความจริง คุณมักจะคิดวิเคราะห์ทุกอย่างอย่างถี่ถ้วนก่อนตัดสินใจ คุณไม่เชื่ออะไรง่ายๆ โดยไม่มีหลักฐาน จุดแข็งของคุณคือสติปัญญาและความรอบคอบ คุณเป็นที่ปรึกษาที่ดีให้คนรอบข้าง เพราะคุณมองเห็นสิ่งที่คนอื่นมองไม่เห็น แต่อย่าลืมใช้หัวใจบ้างในบางครั้ง'
  },
  {
    id: 'dreamer',
    name: 'นักฝัน',
    icon: '🌙',
    traits: ['สร้างสรรค์', 'อ่อนไหว', 'มีจินตนาการ', 'มีศิลปะ', 'เข้าใจผู้อื่น'],
    desc: 'คุณคือคนที่มีโลกภายในที่สวยงามและเต็มไปด้วยจินตนาการ คุณมองเห็นความงามในสิ่งเล็กๆ ที่คนอื่นมองข้าม คุณมีความคิดสร้างสรรค์และมีอารมณ์อ่อนไหว เข้าถึงความรู้สึกของคนอื่นได้ง่าย คุณเป็นนักเล่าเรื่องที่ดี ไม่ว่าจะผ่านคำพูด ดนตรี หรือภาพวาด จุดแข็งของคุณคือความคิดสร้างสรรค์ แต่อย่าลืมอยู่กับโลกความเป็นจริงบ้าง'
  },
  {
    id: 'diplomat',
    name: 'นักการทูต',
    icon: '🤝',
    traits: ['ใจดี', 'เข้าใจผู้อื่น', 'อบอุ่น', 'มีเมตตา', 'ประนีประนอม'],
    desc: 'คุณคือคนที่มีจิตใจงดงามและอบอุ่น คุณเป็นคนที่คอยดูแลความรู้สึกของคนรอบข้างเสมอ คุณเก่งในการสร้างความสามัคคีและทำให้ทุกคนรู้สึกเป็นส่วนหนึ่ง คุณเป็นผู้ฟังที่ดี และคนอื่นมักจะมาหาคุณเมื่อต้องการที่พึ่ง จุดแข็งของคุณคือความเห็นอกเห็นใจและความสามารถในการเชื่อมโยงผู้คน แต่อย่าลืมดูแลความรู้สึกของตัวเองบ้าง'
  }
];

const questions = [
  {
    q: 'เวลาอยู่กับเพื่อน คุณมักจะเป็นคนแบบไหน?',
    opts: [

      { t: 'คนที่คอยสังเกตและวิเคราะห์สถานการณ์', type: 'sage' },
      { t: 'คนที่ชวนคุยเรื่องจินตนาการและความฝัน', type: 'dreamer' },
      { t: 'คนที่คอยดูแลความรู้สึกของทุกคน', type: 'diplomat' }
    ]
  },
  {
    q: 'อะไรที่ทำให้คุณรู้สึกมีพลังมากที่สุด?',
    opts: [
      { t: 'การชนะอุปสรรคและความท้าทาย', type: 'warrior' },
      { t: 'การได้เรียนรู้สิ่งใหม่ๆ', type: 'sage' },
      { t: 'การได้สร้างสรรค์อะไรบางอย่าง', type: 'dreamer' },
      { t: 'การได้ช่วยเหลือคนอื่น', type: 'diplomat' }
    ]
  },
  {
    q: 'เมื่อเจอปัญหา คุณมักจะทำอย่างไร?',
    opts: [
      { t: 'ลงมือแก้ไขทันที', type: 'warrior' },
      { t: 'คิดวิเคราะห์หาสาเหตุให้ถี่ถ้วน', type: 'sage' },
      { t: 'มองหามุมมองใหม่ๆ ที่สร้างสรรค์', type: 'dreamer' },
      { t: 'ปรึกษาคนอื่นและหาทางออกร่วมกัน', type: 'diplomat' }
    ]
  },
  {
    q: 'ข้อไหนใกล้ตัวคุณมากที่สุด?',

      { t: '"ความรู้คือพลัง"', type: 'sage' },
      { t: '"จินตนาการสำคัญกว่าความรู้"', type: 'dreamer' },
      { t: '"ร่วมมือกันจึงจะสำเร็จ"', type: 'diplomat' }
    ]
  },
  {
    q: 'วันหยุดคุณชอบทำอะไร?',
    opts: [
      { t: 'ออกไปผจญภัยหรือเล่นกีฬา', type: 'warrior' },
      { t: 'อ่านหนังสือหรือดูสารคดี', type: 'sage' },
      { t: 'ดูหนัง ฟังเพลง หรือทำงานศิลปะ', type: 'dreamer' },
      { t: 'นัดเจอเพื่อนหรือครอบครัว', type: 'diplomat' }
    ]
  },
  {
    q: 'คนอื่นมักจะบรรยายคุณว่าอย่างไร?',
    opts: [
      { t: 'กล้าหาญ มุ่งมั่น', type: 'warrior' },
      { t: 'ฉลาด มีเหตุผล', type: 'sage' },
      { t: 'สร้างสรรค์ มีจินตนาการ', type: 'dreamer' },
      { t: 'ใจดี เข้าอกเข้าใจ', type: 'diplomat' }
    ]
  },
  {
    q: 'คุณตัดสินใจเรื่องสำคัญอย่างไร?',
    opts: [
      { t: 'ใช้สัญชาตญาณและความกล้า', type: 'warrior' },
      { t: 'ใช้ข้อมูลและเหตุผล', type: 'sage' },
      { t: 'ฟังเสียงหัวใจ', type: 'dreamer' },
      { t: 'ฟังความคิดเห็นคนรอบข้าง', type: 'diplomat' }
    ]
  },
  {
    q: 'สิ่งไหนที่คุณให้ความสำคัญที่สุด?',
    opts: [
      { t: 'อิสรภาพและความอิสระ', type: 'warrior' },
      { t: 'ความจริงและความถูกต้อง', type: 'sage' },

    ]
  },
  {
    q: 'เมื่อคุณโกรธ คุณมักจะทำอย่างไร?',

      { t: 'ถอยไปคิดก่อน', type: 'sage' },
      { t: 'เก็บไว้แล้วเขียนหรือวาดระบาย', type: 'dreamer' },
      { t: 'พูดคุยเพื่อทำความเข้าใจ', type: 'diplomat' }
    ]
  },
  {
    q: 'หนังแนวไหนที่คุณชอบที่สุด?',
    opts: [
      { t: 'Action / ผจญภัย', type: 'warrior' },
      { t: 'สืบสวน / Sci-fi', type: 'sage' },
      { t: 'Fantasy / ดราม่า', type: 'dreamer' },
      { t: 'Romance / Comedy', type: 'diplomat' }
    ]
  },
  {
    q: 'คุณอยากมีชีวิตแบบไหน?',
    opts: [
      { t: 'ชีวิตที่ท้าทายและน่าตื่นเต้น', type: 'warrior' },
      { t: 'ชีวิตที่มีความรู้และความเข้าใจ', type: 'sage' },
      { t: 'ชีวิตที่เต็มไปด้วยศิลปะและความงาม', type: 'dreamer' },
      { t: 'ชีวิตที่อบอุ่นและมีความรัก', type: 'diplomat' }
    ]
  },
  {
    q: 'ข้อไหนคือจุดอ่อนของคุณ?',
    opts: [

      { t: 'เอาใจคนอื่นเกินไป', type: 'diplomat' }
    ]
  },
  {
    q: 'คุณชอบทำงานแบบไหน?',
    opts: [
      { t: 'งานที่ท้าทายและได้ลงมือทำ', type: 'warrior' },
      { t: 'งานที่ต้องใช้ความคิดและการวิเคราะห์', type: 'sage' },
      { t: 'งานที่ต้องใช้ความคิดสร้างสรรค์', type: 'dreamer' },
      { t: 'งานที่ได้ทำงานร่วมกับผู้อื่น', type: 'diplomat' }
    ]
  },
  {

    opts: [

  {

    opts: [

      { t: 'โลกคือห้องเรียน ต้องเรียนรู้ตลอดชีวิต', type: 'sage' },
      { t: 'โลกคือผืนผ้าใบ ต้องสร้างสรรค์สีสัน', type: 'dreamer' },
      { t: 'โลกคือบ้าน ต้องดูแลซึ่งกันและกัน', type: 'diplomat' }
    ]
  }
];

let currentQuestion = 0;
let scores = { warrior: 0, sage: 0, dreamer: 0, diplomat: 0 };
let answers = [];

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--d', (2 + Math.random() * 4) + 's');
    star.style.animationDelay = Math.random() * 5 + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(star);
  }
}
createStars();

function startQuiz() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  currentQuestion = 0;
  scores = { warrior: 0, sage: 0, dreamer: 0, diplomat: 0 };
  answers = [];
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('questionNumber').textContent = `ข้อที่ ${currentQuestion + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = ((currentQuestion) / questions.length * 100) + '%';
  document.getElementById('questionText').textContent = q.q;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-option';
    btn.textContent = opt.t;
    btn.dataset.type = opt.type;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  document.getElementById('btnNext').classList.remove('active');
}

function selectOption(index) {
  const buttons = document.querySelectorAll('.btn-option');
  buttons.forEach((b, i) => b.classList.toggle('selected', i === index));
  document.getElementById('btnNext').classList.add('active');
  answers[currentQuestion] = index;
}

function nextQuestion() {
  if (answers[currentQuestion] === undefined) return;
  const q = questions[currentQuestion];
  const selectedType = q.opts[answers[currentQuestion]].type;
  scores[selectedType]++;

  currentQuestion++;
  if (currentQuestion < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '100%';

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topType = types.find(t => t.id === sorted[0][0]);
  const secondType = types.find(t => t.id === sorted[1][0]);

  document.getElementById('resultIcon').textContent = topType.icon;
  document.getElementById('resultTitle').textContent = `คุณคือ "${topType.name}"`;
  document.getElementById('resultSubtitle').textContent = `บุคลิกภาพที่ ${topType.traits[0]} และ${topType.traits[1]}`;

  const traitsContainer = document.getElementById('resultTraits');
  traitsContainer.innerHTML = '';
  topType.traits.forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'trait-tag';
    tag.textContent = t;
    traitsContainer.appendChild(tag);
  });

  document.getElementById('resultDescription').textContent = topType.desc;

  const scoresSection = document.getElementById('scoresSection');
  scoresSection.innerHTML = '<div style="color:#a89bc0;margin-bottom:12px;font-size:0.9rem;">คะแนนบุคลิกภาพ</div>';
  const colors = { warrior: '#ef4444', sage: '#3b82f6', dreamer: '#a855f7', diplomat: '#10b981' };
  sorted.forEach(([id, score]) => {
    const pct = Math.round(score / questions.length * 100);
    const typeInfo = types.find(t => t.id === id);

    const div = document.createElement('div');
    div.className = 'score-item';
    div.innerHTML = `
      <span class="score-label">${typeInfo.icon} ${typeInfo.name}</span>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:0%;background:${colors[id]}"></div></div>
      <span class="score-val">${pct}%</span>
    `;
    scoresSection.appendChild(div);
  });

  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach((bar, i) => {
      bar.style.width = Math.round(sorted[i][1] / questions.length * 100) + '%';
    });
  }, 200);
}

function restartQuiz() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('startScreen').classList.contains('hidden')) {
    startQuiz();
  } else if (e.key === 'Enter' && document.getElementById('btnNext').classList.contains('active')) {
    nextQuestion();
  }
});
</script>
